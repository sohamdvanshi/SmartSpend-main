name: SmartSpend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Verify app imports and routes
        working-directory: backend
        run: |
          python -c "from app import app; print('✅ App loaded successfully')"
          python -c "from app import app; [print(r) for r in app.url_map.iter_rules()]"

  # Job 2: Docker Build + Smoke Test
  docker-build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t smartspend:latest .

      - name: Smoke test the container
        run: |
          docker run -d -p 5000:5000 --name smartspend-test smartspend:latest
          sleep 10
          curl -f http://localhost:5000/api/health || (docker logs smartspend-test && exit 1)
          docker stop smartspend-test

  # Job 3: Push to GitHub Container Registry (only on main push)
  push-registry:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smartspend:latest
            ghcr.io/${{ github.repository_owner }}/smartspend:${{ github.sha }}
